<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Portfolio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-900 text-white">

  <!-- navbar -->
  <header class="fixed bg-black text-white w-full top-0 z-50">
    <nav class="flex justify-between items-center px-6 py-4">

      <h1 class="font-bold text-lg">Portfolio</h1>

      <!-- boton hamburguesa -->
      <button id="btn-menu" class="md:hidden text-2xl">☰</button>

      <!-- menu -->
      <ul id="menu" class="hidden flex-col absolute top-16 left-0 w-full bg-gray-800 md:static md:flex md:flex-row md:w-auto md:bg-transparent md:gap-6">
        <li><a href="#inicio" class="block p-3 md:p-0 hover:text-blue-400">Inicio</a></li>
        <li><a href="#galeria" class="block p-3 md:p-0 hover:text-blue-400">Galería</a></li>
        <li><a href="#videos" class="block p-3 md:p-0 hover:text-blue-400">Videos</a></li>
        <li><a href="#calculadora" class="block p-3 md:p-0 hover:text-blue-400">Calculadora</a></li>
        <li><a href="#contacto" class="block p-3 md:p-0 hover:text-blue-400">Contacto</a></li>
      </ul>

    </nav>
  </header>

  <!-- contenido -->
  <main class="pt-20 ">

    <section id="inicio" class="min-h-screen flex flex-col items-center justify-center text-center px-6">
      <h2 class="text-3xl font-bold mb-4">Inicio</h2>
    </section>

    <!-- seccion galeria de imagenes -->
    <section id="galeria" class="min-h-screen flex flex-col items-center justify-center text-center px-6">
      <h2 class="text-3xl font-bold mb-4">Galería</h2>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
      
        <img src="img/img1.png" class="galeria-img w-full h-40 object-cover cursor-pointer">
        <img src="img/img2.png" class="galeria-img w-full h-40 object-cover cursor-pointer">
        <img src="img/img3.png" class="galeria-img w-full h-40 object-cover cursor-pointer">
        <img src="img/img4.png" class="galeria-img w-full h-40 object-cover cursor-pointer">
        <img src="img/img5.png" class="galeria-img w-full h-40 object-cover cursor-pointer">
        <img src="img/img6.png" class="galeria-img w-full h-40 object-cover cursor-pointer">

       </div>

    </section>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center">

        <img id="modal-img" class="max-w-[90%] max-h-[90%]">
        
    </div>

    <!-- seccion videos -->
    <section id="videos" class="min-h-screen flex flex-col items-center justify-center text-center px-6">

        <h2 class="text-3xl font-bold mb-10">Videos</h2>

        <div class="grid md:grid-cols-2 gap-8 w-full max-w-5xl">

            <!-- video 1 -->
            <div class="w-full aspect-video">
            <iframe 
                class="w-full h-full rounded"
                src="https://www.youtube.com/embed/rr2H086z16s"
                title="Tutorial HTML y CSS"
                frameborder="0"
                allowfullscreen>
            </iframe>
            </div>

            <!-- video 2 -->
            <div class="w-full aspect-video">
            <iframe 
                class="w-full h-full rounded"
                src="https://www.youtube.com/embed/3xlUAMXui2c"
                title="Tutorial Tailwind"
                frameborder="0"
                allowfullscreen>
            </iframe>
            </div>

            <!-- video 3 -->
            <div class="w-full aspect-video">
            <iframe 
                class="w-full h-full rounded"
                src="https://www.youtube.com/embed/iOVXAbI73WM?si=e16YRRGmsd4ylj-2"
                title="Tutorial PHP y MySQL"
                frameborder="0"
                allowfullscreen>
            </iframe>
            </div>

            <!-- video 4 -->
            <div class="w-full aspect-video">
            <iframe 
                class="w-full h-full rounded"
                src="https://www.youtube.com/embed/knVwokXITGI?si=bxgjVNuW_eyh_6Ui" 
                title="Tutorial Base de Datos"
                frameborder="0"
                allowfullscreen>
            </iframe>
            </div>

        </div>

    </section>
 
    <!-- seccion calculadora -->
    <section id="calculadora" class="min-h-screen flex flex-col items-center justify-center text-center px-6">
      <h2 class="text-3xl font-bold mb-4">Calculadora</h2>

      <div class="bg-gray-800 p-4 rounded shadow w-72">

        <input 
          id="pantalla"
          type="text"
          class="w-full mb-4 p-2 text-right text-xl bg-black text-white rounded"
          disabled
        >

        <!-- botones calculadora-->
        <div class="grid grid-cols-4 gap-2">

          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">7</button>
          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">8</button>
          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">9</button>
          <button class="btn-op bg-blue-600 text-white p-3 rounded hover:bg-blue-500">÷</button>

          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">4</button>
          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">5</button>
          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">6</button>
          <button class="btn-op bg-blue-600 text-white p-3 rounded hover:bg-blue-500">x</button>

          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">1</button>
          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">2</button>
          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">3</button>
          <button class="btn-op bg-blue-600 text-white p-3 rounded hover:bg-blue-500">-</button>

          <button class="btn bg-gray-700 text-white p-3 rounded hover:bg-gray-600">0</button>
          <button id="clear" class="btn-op bg-red-600 text-white p-3 rounded hover:bg-red-500">C</button>
          <button id="igual" class="btn-op bg-blue-600 text-white p-3 rounded hover:bg-blue-500">=</button>
          <button class="btn-op bg-blue-600 text-white p-3 rounded hover:bg-blue-500">+</button>

        </div>

      </div>


    </section>

    <section id="contacto" class="min-h-screen flex flex-col items-center justify-center text-center px-6">
      <h2 class="text-3xl font-bold mb-4">Contacto</h2>

       <form id="formulario" class="w-full max-w-md space-y-4">

        <!-- nombre -->
        <div>
          <input 
            type="text" 
            id="nombre" 
            placeholder="Nombre"
            class="w-full p-2 rounded bg-gray-800 text-white border border-gray-700"
          >
          <p id="error-nombre" class="text-red-400 text-sm hidden">El nombre es obligatorio</p>
        </div>

        <!-- email -->
        <div>
          <input 
            type="email" 
            id="email" 
            placeholder="Email"
            class="w-full p-2 rounded bg-gray-800 text-white border border-gray-700"
          >
          <p id="error-email" class="text-red-400 text-sm hidden">Email inválido</p>
        </div>

        <!-- asunto -->
        <div>
          <input 
            type="text" 
            id="asunto" 
            placeholder="Asunto"
            class="w-full p-2 rounded bg-gray-800 text-white border border-gray-700"
          >
          <p id="error-asunto" class="text-red-400 text-sm hidden">El asunto es obligatorio</p>
        </div>

        <!-- mensaje -->
        <div>
          <textarea 
            id="mensaje" 
            placeholder="Mensaje"
            class="w-full p-2 rounded bg-gray-800 text-white border border-gray-700"
          ></textarea>
          <p id="error-mensaje" class="text-red-400 text-sm hidden">El mensaje es obligatorio</p>
        </div>

        <!-- botón -->
    <button type="submit" class="w-full bg-blue-600 p-2 rounded hover:bg-blue-500">Enviar</button>

    <!-- respuesta -->
    <p id="respuesta" class="text-center mt-2"></p>

       </form>

    </section>

  </main>

  <script src="javascript/menu.js" defer></script>
  <script src="javascript/galeria.js" defer></script>
  <script src="javascript/calculadora.js" defer></script>
  <script src="javascript/formulario.js" defer></script>

</body>
</html>
